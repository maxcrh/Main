<template>
    <lightning-card title={capitalizedGreeting} icon-name="custom:custom14">
        <div class="slds-m-around_medium">
           <template for:each={contacts} for:item="contact">
              <div key = {contact.Id}> 
                 {contact.Name}, {contact.Title}
              </div>
           </template>
           <br/>
           <h1> Hello, {greeting}, hoje é {currentDate}</h1>
           <lightning-input 
                id="greeting"
                label="Name"
                value={greeting}
                onchange={handleGreetingChange}>
            </lightning-input>

            <lightning-input 
                label="Time"
                value={time}
                onblur={handleTimeChange}>
            </lightning-input>
            <br/>
        </div>
     </lightning-card>
</template>
